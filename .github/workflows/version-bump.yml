name: Version Bump

on:
  push:
    branches: [main]

jobs:
  bump:
    name: Bump patch version
    runs-on: ubuntu-latest
    if: "!startsWith(github.event.head_commit.message, 'chore: bump version')"
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Bump patch version in pyproject.toml
        run: |
          python -c "
          import re
          text = open('pyproject.toml').read()
          m = re.search(r'(?<=^version = \")[^\"]+(?=\")', text, re.MULTILINE)
          old = m.group(0); parts = old.split('.')
          parts[2] = str(int(parts[2]) + 1); new = '.'.join(parts)
          open('pyproject.toml', 'w').write(text.replace(f'version = \"{old}\"', f'version = \"{new}\"', 1))
          print(f'Bumped {old} -> {new}')
          "

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add pyproject.toml
          git diff --cached --quiet || git commit -m "chore: bump version [skip ci]"
          git push
